<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="background:#fff;border:1px solid #E5E4E7;border-radius:16px;box-shadow:0 1px 2px rgba(8,6,13,0.05),0 1px 1px rgba(8,6,13,0.03);font-family:'Inter',system-ui,sans-serif;overflow:hidden">
  <div onClick="{{ toggle }}" style="display:flex;align-items:center;gap:11px;padding:18px 18px;cursor:pointer;user-select:none">
    <div style="flex:none;width:38px;height:38px;border-radius:11px;background:rgba(255,111,97,0.10);display:flex;align-items:center;justify-content:center;color:#FF6F61">
      <sc-if value="{{ iconUser }}" hint-placeholder-val="{{ true }}"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></sc-if>
      <sc-if value="{{ iconVerify }}"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8.5 12l2.2 2.2L15.5 9.5"/></svg></sc-if>
      <sc-if value="{{ iconWork }}"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M3 12h18"/></svg></sc-if>
      <sc-if value="{{ iconStudy }}"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10L12 5 2 10l10 5 10-5z"/><path d="M6 12v5c0 1 2.5 2.5 6 2.5s6-1.5 6-2.5v-5"/></svg></sc-if>
      <sc-if value="{{ iconEmergency }}"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.1-8.7A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.4 1.8.7 2.7a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.4-1.2a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.7.7a2 2 0 0 1 1.7 2z"/></svg></sc-if>
      <sc-if value="{{ iconPrefs }}"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 7h-7"/><path d="M6 7H4"/><path d="M11 17H4"/><path d="M20 17h-2"/><circle cx="9" cy="7" r="2.4"/><circle cx="15" cy="17" r="2.4"/></svg></sc-if>
      <sc-if value="{{ iconBio }}"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><path d="M8 9h8M8 13h5"/></svg></sc-if>
      <sc-if value="{{ iconShield }}"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg></sc-if>
    </div>
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:baseline;gap:7px;min-width:0">
        <span style="font-size:12px;font-weight:700;color:#FF6F61;letter-spacing:.02em;flex:none">{{ num }}</span>
        <span style="font-size:16px;font-weight:600;color:#08060D;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ title }}</span>
      </div>
      <sc-if value="{{ showSummary }}" hint-placeholder-val="{{ true }}">
        <div style="margin-top:4px;font-size:13px;color:#6B6375;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{ summary }}</div>
      </sc-if>
    </div>
    <sc-if value="{{ isDone }}" hint-placeholder-val="{{ true }}">
      <span style="flex:none;display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:999px;background:#E6F4EE;color:#0F6E56;font-size:11px;font-weight:600;letter-spacing:.01em;white-space:nowrap"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>Done</span>
    </sc-if>
    <sc-if value="{{ isTodo }}" hint-placeholder-val="{{ true }}">
      <span style="flex:none;display:inline-flex;align-items:center;padding:5px 11px;border-radius:999px;background:#FEF3C7;color:#92400E;font-size:11px;font-weight:600;letter-spacing:.01em;white-space:nowrap">To do</span>
    </sc-if>
    <sc-if value="{{ isOptional }}" hint-placeholder-val="{{ true }}">
      <span style="flex:none;display:inline-flex;align-items:center;padding:5px 11px;border-radius:999px;background:rgba(31,42,68,0.07);color:#6B6375;font-size:11px;font-weight:600;letter-spacing:.01em;white-space:nowrap">Optional</span>
    </sc-if>
    <sc-if value="{{ isOpen }}" hint-placeholder-val="{{ true }}">
      <svg style="flex:none;color:#908897" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>
    </sc-if>
    <sc-if value="{{ notOpen }}">
      <svg style="flex:none;color:#908897" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
    </sc-if>
  </div>
  <sc-if value="{{ isOpen }}" hint-placeholder-val="{{ true }}">
    <div style="padding:2px 20px 20px;border-top:1px solid #EFEDE9">
      <div style="height:16px"></div>
      <div style="display:grid;grid-template-columns:{{ gridCols }};gap:15px 16px">
        <sc-for list="{{ fields }}" as="f" hint-placeholder-count="4">
          <div style="display:flex;flex-direction:column;gap:6px;min-width:0">
            <label style="font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#908897;line-height:1.35;display:block">
              <span style="vertical-align:middle">{{ f.label }}</span><sc-if value="{{ f.missing }}" hint-placeholder-val="{{ true }}"><span style="display:inline-block;vertical-align:middle;margin-left:7px;color:#B7791F;font-size:9px;letter-spacing:.03em;text-transform:none;font-weight:700;background:#FEF3C7;padding:2px 6px;border-radius:999px">Required</span></sc-if>
            </label>
            <sc-if value="{{ f.inFilled }}" hint-placeholder-val="{{ true }}">
              <div style="border:1px solid #E5E4E7;border-radius:10px;padding:10px 12px;font-size:14px;color:#2A2433;background:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ f.value }}</div>
            </sc-if>
            <sc-if value="{{ f.inMissing }}">
              <div style="border:1.5px solid #FF6F61;border-radius:10px;padding:10px 12px;font-size:14px;color:#CC4A3C;background:rgba(255,111,97,0.06);display:flex;align-items:center;gap:7px"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>Add details</div>
            </sc-if>
            <sc-if value="{{ f.inEmpty }}">
              <div style="border:1px dashed #DAD8DC;border-radius:10px;padding:10px 12px;font-size:14px;color:#A39CAC;background:#fff">Not added</div>
            </sc-if>
            <sc-if value="{{ f.upFilled }}">
              <div style="border:1px solid #CDEBDD;border-radius:10px;padding:10px 12px;font-size:13px;color:#0F6E56;background:#F3FBF7;display:flex;align-items:center;gap:8px;white-space:nowrap;overflow:hidden"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg><span style="overflow:hidden;text-overflow:ellipsis">{{ f.value }}</span></div>
            </sc-if>
            <sc-if value="{{ f.upMissing }}">
              <div style="border:1.5px dashed #FF6F61;border-radius:10px;padding:11px 12px;font-size:13px;color:#CC4A3C;background:rgba(255,111,97,0.06);display:flex;align-items:center;gap:8px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>Upload file</div>
            </sc-if>
            <sc-if value="{{ f.upEmpty }}">
              <div style="border:1px dashed #DAD8DC;border-radius:10px;padding:11px 12px;font-size:13px;color:#A39CAC;background:#fff;display:flex;align-items:center;gap:8px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>Upload file</div>
            </sc-if>
            <sc-if value="{{ f.isTextarea }}">
              <textarea rows="3" placeholder="Tell landlords a bit about yourself — your course, what you're after in a place, and how you like to live." onInput="{{ autoGrow }}" style="width:100%;box-sizing:border-box;border:1px solid #E5E4E7;border-radius:10px;padding:11px 13px;font-size:14px;font-family:inherit;color:#2A2433;background:#fff;line-height:1.55;resize:none;min-height:92px;overflow:hidden"></textarea>
            </sc-if>
            <sc-if value="{{ f.isCheckbox }}">
              <div style="display:flex;align-items:flex-start;gap:11px;border-radius:10px;padding:11px 13px;cursor:pointer;{{ f.cbRowStyle }}">
                <div style="flex:none;width:19px;height:19px;border-radius:5px;display:flex;align-items:center;justify-content:center;margin-top:1px;{{ f.cbBoxStyle }}"><sc-if value="{{ f.checked }}" hint-placeholder-val="{{ true }}"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></sc-if></div>
                <span style="font-size:13.5px;color:#2A2433;line-height:1.45">{{ f.attestText }}</span>
              </div>
            </sc-if>
          </div>
        </sc-for>
      </div>
      <sc-if value="{{ hasNote }}" hint-placeholder-val="{{ true }}">
        <div style="margin-top:15px;display:flex;align-items:flex-start;gap:9px;padding:11px 13px;border-radius:10px;background:#F8F6F1;border:1px solid #EFEDE9;font-size:12.5px;color:#6B6375;line-height:1.5"><svg style="flex:none;margin-top:1px;color:#908897" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 8h.01"/></svg><span>{{ note }}</span></div>
      </sc-if>
      <sc-if value="{{ showSave }}" hint-placeholder-val="{{ true }}">
        <div style="margin-top:16px;display:flex;align-items:center;gap:12px">
          <button style="background:#FF6F61;color:#fff;border:0;padding:10px 18px;border-radius:10px;font-weight:600;font-size:14px;font-family:inherit;cursor:pointer;white-space:nowrap;flex:none">Save section</button>
          <span style="font-size:12.5px;color:#908897">{{ saveHint }}</span>
        </div>
      </sc-if>
    </div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:680,&quot;height&quot;:260},&quot;num&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;01&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;icon&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;user&quot;,&quot;verify&quot;,&quot;work&quot;,&quot;study&quot;,&quot;emergency&quot;,&quot;prefs&quot;,&quot;bio&quot;,&quot;guarantor&quot;],&quot;default&quot;:&quot;user&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;About you&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;status&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;done&quot;,&quot;todo&quot;,&quot;optional&quot;],&quot;default&quot;:&quot;todo&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;summary&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;note&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;stack&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;fields&quot;:{&quot;editor&quot;:null,&quot;default&quot;:[],&quot;tsType&quot;:&quot;any[]&quot;}}">
class Component extends DCLogic {
  state = { open: null };
  renderVals() {
    const p = this.props;
    const status = p.status || 'todo';
    const def = status === 'todo';
    const open = (this.state && this.state.open != null) ? this.state.open : def;
    const fields = (p.fields || []).map(x => {
      const isUpload = x.type === 'upload';
      const isTextarea = x.type === 'textarea';
      const isCheckbox = x.type === 'checkbox';
      const isInput = !isUpload && !isTextarea && !isCheckbox;
      const missing = !!x.missing;
      const filled = !missing && !!x.value;
      const empty = !missing && !x.value;
      const checked = !!x.checked;
      return {
        label: x.label,
        value: x.value || '',
        missing,
        isTextarea,
        isCheckbox,
        checked,
        attestText: x.text || '',
        cbBoxStyle: checked ? 'border:1.5px solid #0F6E56;background:#0F6E56' : 'border:1.5px solid #FF6F61;background:#fff',
        cbRowStyle: checked ? 'border:1px solid #CDEBDD;background:#F3FBF7' : 'border:1.5px solid #FF6F61;background:rgba(255,111,97,0.06)',
        inFilled: isInput && filled,
        inMissing: isInput && missing,
        inEmpty: isInput && empty,
        upFilled: isUpload && filled,
        upMissing: isUpload && missing,
        upEmpty: isUpload && empty
      };
    });
    const missingCount = fields.filter(f => f.missing).length;
    return {
      isDone: status === 'done',
      isTodo: status === 'todo',
      isOptional: status === 'optional',
      isOpen: open,
      notOpen: !open,
      showSummary: status !== 'todo' && !open,
      hasNote: !!p.note && open,
      showSave: status === 'todo' && open,
      saveHint: missingCount > 0 ? (missingCount + ' fields still need details') : 'Looks complete',
      gridCols: p.stack ? '1fr' : 'repeat(auto-fit,minmax(232px,1fr))',
      note: p.note || '',
      summary: p.summary || '',
      title: p.title || '',
      num: p.num || '',
      fields,
      toggle: () => this.setState(s => ({ open: !((s && s.open != null) ? s.open : def) })),
      autoGrow: (e) => { const t = e.target; t.style.height = 'auto'; t.style.height = (t.scrollHeight + 2) + 'px'; },
      iconUser: p.icon === 'user',
      iconVerify: p.icon === 'verify',
      iconWork: p.icon === 'work',
      iconStudy: p.icon === 'study',
      iconEmergency: p.icon === 'emergency',
      iconPrefs: p.icon === 'prefs',
      iconBio: p.icon === 'bio',
      iconShield: p.icon === 'guarantor'
    };
  }
}
</script>
</body>
</html>
