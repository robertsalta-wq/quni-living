<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="background:#fff;border:1px solid #E5E4E7;border-radius:16px;box-shadow:0 1px 2px rgba(8,6,13,0.05),0 1px 1px rgba(8,6,13,0.03);font-family:'Inter',system-ui,sans-serif;overflow:hidden">
  <div style="display:flex;align-items:center;gap:14px;padding:18px 20px">
    <div style="flex:none;width:42px;height:42px;border-radius:12px;background:rgba(255,111,97,0.10);display:flex;align-items:center;justify-content:center;color:#FF6F61">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M15.5 8.5l-2 5-5 2 2-5z"/></svg>
    </div>
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:baseline;gap:9px"><span style="font-size:16px;font-weight:600;color:#08060D">Your situation</span></div>
      <sc-if value="{{ collapsed }}" hint-placeholder-val="{{ true }}">
        <div style="margin-top:4px;font-size:13px;color:#6B6375;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{ summaryText }}</div>
      </sc-if>
      <sc-if value="{{ expanded }}">
        <div style="margin-top:4px;font-size:13px;color:#6B6375">Tell us your situation so we ask for the right details.</div>
      </sc-if>
    </div>
    <sc-if value="{{ collapsed }}" hint-placeholder-val="{{ true }}">
      <span style="flex:none;display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:999px;background:#E6F4EE;color:#0F6E56;font-size:11px;font-weight:600;white-space:nowrap"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>Done</span>
      <button style="flex:none;display:inline-flex;align-items:center;gap:5px;background:none;border:0;color:#FF6F61;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;padding:6px 4px"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>Edit</button>
    </sc-if>
    <sc-if value="{{ expanded }}">
      <span style="flex:none;display:inline-flex;align-items:center;padding:5px 11px;border-radius:999px;background:#FEF3C7;color:#92400E;font-size:11px;font-weight:600;white-space:nowrap">To do</span>
    </sc-if>
  </div>
  <sc-if value="{{ expanded }}" hint-placeholder-val="{{ true }}">
    <div style="padding:2px 20px 20px;border-top:1px solid #EFEDE9">
      <div style="height:16px"></div>
      <div style="display:grid;grid-template-columns:{{ gridCols }};gap:{{ gridGap }}">
        <sc-for list="{{ tiles }}" as="t" hint-placeholder-count="6">
          <div style="position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;padding:{{ tilePad }};border-radius:14px;cursor:pointer;{{ t.tileStyle }}">
            <sc-if value="{{ t.sel }}"><div style="position:absolute;top:9px;right:9px;width:19px;height:19px;border-radius:999px;background:#FF6F61;display:flex;align-items:center;justify-content:center"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div></sc-if>
            <sc-if value="{{ t.isCap }}" hint-placeholder-val="{{ true }}"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="{{ t.iconColor }}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10L12 5 2 10l10 5 10-5z"/><path d="M6 12v5c0 1 2.5 2.5 6 2.5s6-1.5 6-2.5v-5"/></svg></sc-if>
            <sc-if value="{{ t.isBrief }}"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="{{ t.iconColor }}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M3 12h18"/></svg></sc-if>
            <sc-if value="{{ t.isPlane }}"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="{{ t.iconColor }}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5a2.1 2.1 0 0 0-3-3L13 8 4.8 6.2a.5.5 0 0 0-.5.8l3.9 4-2.2 2.2-1.8-.4a.5.5 0 0 0-.5.8L6 18l1.4 2.6a.5.5 0 0 0 .8-.1l2.2-2.2 4 3.9a.5.5 0 0 0 .9-.5z"/></svg></sc-if>
            <sc-if value="{{ t.isPack }}"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="{{ t.iconColor }}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 10a4 4 0 0 1 4-4h6a4 4 0 0 1 4 4v8a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2z"/><path d="M9 6V4.5A1.5 1.5 0 0 1 10.5 3h3A1.5 1.5 0 0 1 15 4.5V6"/><path d="M8 13h8"/><path d="M10 13v3h4v-3"/></svg></sc-if>
            <sc-if value="{{ t.isChair }}"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="{{ t.iconColor }}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 11V7a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v4"/><path d="M3 12a2 2 0 0 1 2 2v3h14v-3a2 2 0 0 1 2-2"/><path d="M6 17v3M18 17v3"/></svg></sc-if>
            <sc-if value="{{ t.isClock }}"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="{{ t.iconColor }}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></sc-if>
            <span style="font-size:14px;font-weight:600;text-align:center;line-height:1.2;color:{{ t.labelColor }}">{{ t.label }}</span>
          </div>
        </sc-for>
      </div>
      <div style="margin-top:14px;font-size:12.5px;color:#908897">Your choice sets which details we ask for next.</div>
    </div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:760,&quot;height&quot;:300},&quot;collapsed&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;selected&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;&quot;,&quot;student&quot;,&quot;working&quot;,&quot;whv&quot;,&quot;backpacker&quot;,&quot;retired&quot;,&quot;between&quot;],&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;device&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;web&quot;,&quot;app&quot;],&quot;default&quot;:&quot;web&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    const collapsed = !!p.collapsed;
    const selected = p.selected || '';
    const isWeb = (p.device || 'app') === 'web';
    const labelMap = { student:'Student', working:'Working', whv:'Working holiday', backpacker:'Backpacker', retired:'Retired', between:'Between jobs' };
    const routeMap = { student:'Study & funding', working:'Employment & income', whv:'Visa & funding', backpacker:'Visa & funding', retired:'Income — super or pension', between:'Income — savings or support' };
    const selLabel = labelMap[selected] || '';
    const routeName = routeMap[selected] || '';
    const tilesDef = [['student','Student','cap'],['working','Working','briefcase'],['whv','Working holiday','plane'],['backpacker','Backpacker','backpack'],['retired','Retired','armchair'],['between','Between jobs','clock']];
    const tiles = tilesDef.map(([key,label,icon]) => {
      const sel = key === selected;
      return {
        key, label, icon, sel,
        isCap: icon==='cap', isBrief: icon==='briefcase', isPlane: icon==='plane', isPack: icon==='backpack', isChair: icon==='armchair', isClock: icon==='clock',
        tileStyle: sel ? 'border:1.5px solid #FF6F61;background:rgba(255,111,97,0.06)' : 'border:1.5px solid #E5E4E7;background:#fff',
        iconColor: sel ? '#FF6F61' : '#2A2433',
        labelColor: sel ? '#08060D' : '#2A2433'
      };
    });
    return {
      collapsed,
      expanded: !collapsed,
      tiles,
      gridCols: isWeb ? 'repeat(6,1fr)' : '1fr 1fr',
      gridGap: isWeb ? '10px' : '12px',
      tilePad: isWeb ? '16px 8px' : '18px 12px',
      summaryText: selLabel + (routeName ? (' \u00b7 ' + routeName) : '')
    };
  }
}
</script>
</body>
</html>
