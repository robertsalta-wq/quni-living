name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        # Temporarily non-blocking - 188 pre-existing errors, tracked in TECH_DEBT.md. Do not remove this step.
        continue-on-error: true
        run: npm run lint

      # Blocking carve-out: Rules of Hooks only. Full lint stays advisory above.
      # Catches conditional / post-return hooks (React #310 class) before merge.
      - name: Rules of Hooks
        run: npm run lint:rules-of-hooks

      # Blocking: app chrome must stay in AppHeader / AppActionBar (docs/app-chrome-brief.md §6).
      - name: App chrome lint guard
        run: npm run lint:app-chrome

      - name: Typecheck
        run: npx tsc -b --noEmit

      - name: Check Anthropic model IDs
        run: npm run check:anthropic-models

      # Raster PDF unit/integration tests shell out to pdftoppm (poppler-utils).
      - name: Install poppler-utils
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Unit tests
        run: npm test

      - name: Integration tests
        run: npm run test:integration

      - name: Build
        run: npm run build

  e2e:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: read
      statuses: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Replaces patrickedqvist/wait-for-vercel-preview: that action filters on
      # creator login vercel[bot], which misses redeploys after force-push (actor is
      # often the pusher). Poll GitHub Deployments API for this SHA with no actor filter.
      - name: Wait for Vercel preview
        id: vercel_preview
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha }}
          MAX_TIMEOUT: "600"
          CHECK_INTERVAL: "5"
        run: bash .github/scripts/wait-for-vercel-preview.sh

      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASE_URL: ${{ steps.vercel_preview.outputs.url }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
