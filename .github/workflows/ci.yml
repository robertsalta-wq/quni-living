name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verify VIC Form 1 blank PDF baseline
        run: |
          if [ -f docs/vic/form-1-blank.pdf ]; then
            node scripts/freeze-vic-form1-blank.mjs --check
          else
            echo "Skip: docs/vic/form-1-blank.pdf not committed yet"
          fi
