name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        # Temporarily non-blocking - 188 pre-existing errors, tracked in TECH_DEBT.md. Do not remove this step.
        continue-on-error: true
        run: npm run lint

      - name: Typecheck
        run: npx tsc -b --noEmit

      - name: Check Anthropic model IDs
        run: npm run check:anthropic-models

      - name: Build
        run: npm run build
